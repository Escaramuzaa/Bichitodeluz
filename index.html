<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Precios — Cafetería</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Mantengo todos tus estilos originales intactos */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#eeece7;--border:#e0ddd7;--border2:#c9c5bd;--text:#1c1b18;--text2:#6b6760;--text3:#a09c96;--accent:#2d5a27;--accent-light:#e8f2e6;--accent-text:#1e3d1a;--warn:#7a4a00;--warn-bg:#fff3e0;--danger:#8b2020;--danger-bg:#fde8e8;--info:#1a4a7a;--info-bg:#e8f0fa;--radius:10px;--radius-sm:6px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:15px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.sync-dot.ok{background:#4caf50}.sync-dot.syncing{background:#ff9800;animation:pulse .8s infinite}.sync-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
nav{display:flex;gap:2px}
.nav-btn{padding:6px 14px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}.nav-btn.active{background:var(--surface2);color:var(--text)}
main{max-width:1200px;margin:0 auto;padding:2rem}
.section{display:none}.section.active{display:block}
h2{font-size:20px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px}
.section-desc{color:var(--text2);font-size:13px;margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}
.card-body{padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{color:var(--danger);border-color:#f5c0c0}.btn-danger:hover{background:var(--danger-bg)}
input[type="text"],input[type="number"],input[type="password"],select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;outline:none}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:end}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2)}
tbody tr{border-bottom:1px solid var(--border)}
td{padding:10px 12px;vertical-align:middle}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.badge-green{background:var(--accent-light);color:var(--accent-text)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:2.5rem;text-align:center;cursor:pointer;background:var(--surface)}
.invoice-item{display:grid;grid-template-columns:1fr 80px 90px 90px 24px;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.invoice-item.selected{border-color:var(--accent);background:var(--accent-light)}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--surface);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1}
.tab-bar{display:flex;gap:4px;margin-bottom:1rem}
.tab-btn{padding:6px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer}
.tab-btn.active{background:var(--surface2);border-color:var(--border2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-body{padding:1.5rem}
.ingredient-row{display:grid;grid-template-columns:1fr 80px 90px auto;gap:8px;align-items:center;margin-bottom:8px}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>Gestor de Precios</div>
  <div style="display:flex;align-items:center;gap:1rem">
    <div class="sync-status" id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">Sin conectar</span></div>
    <nav>
      <button class="nav-btn active" onclick="showSection('materias',this)">Materias primas</button>
      <button class="nav-btn" onclick="showSection('facturas',this)">Facturas</button>
      <button class="nav-btn" onclick="showSection('articulos',this)">Artículos</button>
      <button class="nav-btn" onclick="showSection('dashboard',this)">Dashboard</button>
      <button class="nav-btn" onclick="showSection('config',this)">⚙</button>
    </nav>
  </div>
</header>
<main>

<section id="sec-materias" class="section active">
  <h2>Materias primas</h2>
  <div class="card" style="margin-bottom:1rem">
    <div class="card-body">
      <div class="form-row">
        <div><label>Nombre</label><input type="text" id="mp-nombre"></div>
        <div><label>Precio total (€)</label><input type="number" id="mp-precio" step="0.01"></div>
        <div><label>Cantidad</label><input type="number" id="mp-cantidad" step="any"></div>
        <div><label>Unidad</label><select id="mp-unidad"><option value="kg">kg</option><option value="g">g</option><option value="L">litro</option><option value="mL">mL</option><option value="ud">unidad</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="addMateria()" style="margin-top:10px">+ Añadir</button>
    </div>
  </div>
  <div class="card">
    <div id="mp-table-wrap" class="card-body">Cargando inventario...</div>
  </div>
</section>

<section id="sec-facturas" class="section">
  <h2>Lector de facturas</h2>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-pdf" onclick="switchTab('pdf')">Subir factura</button>
    <button class="tab-btn" id="tab-text" onclick="switchTab('text')">Entrada rápida</button>
  </div>

  <div id="tab-content-pdf">
    <div class="card" style="margin-bottom:1rem">
      <div class="card-body">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
          <div style="font-size:30px">🧾</div>
          <div>Haz clic o arrastra facturas aquí</div>
        </div>
        <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(event)">
        <div id="invoice-status" style="margin-top:10px;display:none">
          <div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><span id="inv-status-text">Analizando...</span></div>
          <div id="inv-files-progress" style="margin-top:10px"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-content-text" style="display:none">
    <div class="card" style="margin-bottom:1rem">
      <div class="card-body">
        <textarea id="quick-text" placeholder="Ej: bolsa croissant 20 unidades 6 euros" style="width:100%;height:100px;margin-bottom:10px;padding:10px"></textarea>
        <button class="btn btn-primary" onclick="processQuickText()">Analizar con Gemini</button>
      </div>
    </div>
  </div>

  <div id="invoice-results" style="display:none">
    <div class="card">
      <div class="card-header"><span class="card-title">Productos detectados</span><button class="btn btn-primary btn-sm" onclick="importSelected()">Importar →</button></div>
      <div class="card-body" id="invoice-items-list"></div>
    </div>
  </div>
</section>

<section id="sec-config" class="section">
  <h2>Configuración</h2>
  <div class="card" style="margin-bottom:1rem">
    <div class="card-body">
      <label>Gemini API Key (AIzaSy...)</label>
      <div style="display:flex;gap:8px">
        <input type="password" id="api-key-input" placeholder="Pega tu clave aquí">
        <button class="btn btn-primary" onclick="saveApiKey()">Guardar</button>
      </div>
      <div id="api-key-status" style="margin-top:10px;font-size:12px"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <label>URL Apps Script (Google Sheets)</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="script-url-input">
        <button class="btn btn-primary" onclick="connectScript()">Conectar</button>
      </div>
      <div id="script-url-status" style="margin-top:10px;font-size:12px"></div>
    </div>
  </div>
</section>

</main>
<div class="toast" id="toast"></div>

<script>
var DB={materias:[],articulos:[]};
var invoiceItems=[];

function loadLocal(){try{var s=localStorage.getItem('cafeteria_db_v3');if(s)DB=JSON.parse(s);}catch(e){}}
function saveLocal(){localStorage.setItem('cafeteria_db_v3',JSON.stringify(DB));}
function getApiKey(){return localStorage.getItem('cafeteria_api_key')||'';}
function getScriptUrl(){return localStorage.getItem('cafeteria_script_url')||'';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function saveApiKey(){
  var v=document.getElementById('api-key-input').value.trim();
  if(!v.startsWith('AIza'))return toast('La clave debe empezar por AIzaSy...');
  localStorage.setItem('cafeteria_api_key',v);
  loadApiKeyStatus();
  toast('Clave guardada ✓');
}

function loadApiKeyStatus(){
  var k=getApiKey();
  var el=document.getElementById('api-key-status');
  if(k) el.innerHTML='<span style="color:var(--accent)">✓ Configurada correctamente</span>';
}

// --- LÓGICA DE IA (GEMINI) ---
var PROMPT_SISTEMA = `Eres un experto en facturas para cafeterías. 
INSTRUCCIONES:
1. NOMBRES HUMANOS: Traduce códigos raros a nombres de barra. Ej: "05 CABRAS" -> "Agua 500ml", "C-65 CROIS" -> "Croissant".
2. UNIDAD DE COMPRA: El 'precio_total' es el precio de la bolsa o caja entera (SIN IVA).
3. CANTIDAD INTERNA: En 'cantidad', pon cuántas unidades o litros hay DENTRO de esa bolsa/caja.
   Ej: "Bolsa croissant 20ud a 6€" -> nombre:"Croissant", precio_total:6, cantidad:20, unidad:"ud".
Responde SOLO con este JSON:
{"fecha":"YYYY-MM-DD","productos":[{"nombre":"string","cantidad":number,"unidad":"kg|g|L|mL|ud","precio_total":number,"detalle":"string"}]}`;

async function analyzeSingleFile(file, key) {
  const base64 = await new Promise((res) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });

  // USAMOS v1beta PARA ASEGURAR COMPATIBILIDAD CON JSON MODE
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  
  const payload = {
    contents: [{ parts: [{ text: PROMPT_SISTEMA }, { inline_data: { mime_type: file.type || "application/pdf", data: base64 } }] }],
    generationConfig: { response_mime_type: "application/json" }
  };

  const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
  const d = await resp.json();

  if (!resp.ok) throw new Error(d.error?.message || "Error en Gemini");
  if (!d.candidates || d.candidates.length === 0) throw new Error("La IA no devolvió resultados.");

  return JSON.parse(d.candidates[0].content.parts[0].text);
}

async function handleFiles(e) {
  var key = getApiKey(); if(!key) return toast('Pon la API Key en configuración');
  var files = Array.from(e.target.files);
  var status = document.getElementById('invoice-status');
  status.style.display = 'block';
  invoiceItems = [];

  for (let file of files) {
    try {
      let res = await analyzeSingleFile(file, key);
      res.productos.forEach(p => {
        p._id = Math.random().toString(36).substr(2,9);
        p._selected = true;
        p._fecha = res.fecha;
        invoiceItems.push(p);
      });
    } catch (err) {
      toast('Error con ' + file.name + ': ' + err.message);
    }
  }
  status.style.display = 'none';
  renderResults();
}

function renderResults() {
  var list = document.getElementById('invoice-items-list');
  document.getElementById('invoice-results').style.display = 'block';
  list.innerHTML = invoiceItems.map(item => `
    <div class="invoice-item selected">
      <div><strong>${item.nombre}</strong> <small>${item.detalle || ''}</small></div>
      <input type="number" value="${item.cantidad}" style="width:60px">
      <span>${item.unidad}</span>
      <input type="number" value="${item.precio_total}" step="0.01" style="width:70px">
    </div>
  `).join('');
}

// --- FUNCIONES DE NAVEGACIÓN Y MATERIAS ---
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  if(btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  if(name==='materias') renderMaterias();
}

function renderMaterias() {
  var wrap = document.getElementById('mp-table-wrap');
  if(!DB.materias.length) { wrap.innerHTML = "Sin ingredientes."; return; }
  var rows = DB.materias.map(m => `<tr><td>${m.nombre}</td><td>${m.precio}€</td><td>${m.cantidad}${m.unidad}</td><td style="color:var(--accent)">${(m.precio/m.cantidad).toFixed(2)}€/un</td></tr>`).join('');
  wrap.innerHTML = `<table><thead><tr><th>Nombre</th><th>Precio</th><th>Cant.</th><th>Coste</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function addMateria() {
  var n = document.getElementById('mp-nombre').value;
  var p = parseFloat(document.getElementById('mp-precio').value);
  var c = parseFloat(document.getElementById('mp-cantidad').value);
  var u = document.getElementById('mp-unidad').value;
  if(!n || !p || !c) return toast('Faltan datos');
  DB.materias.push({nombre:n, precio:p, cantidad:c, unidad:u});
  saveLocal(); renderMaterias(); toast('Añadido ✓');
}

// Inicialización
loadLocal(); loadApiKeyStatus(); renderMaterias();
</script>
</body>
</html>
